<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animiertes Glücksrad</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>🎡 Animiertes Glücksrad</h1>

      <section class="wheel-wrapper" aria-label="Glücksrad Bereich">
        <div class="pointer" aria-hidden="true"></div>
        <canvas id="wheelCanvas" width="420" height="420" aria-label="Glücksrad"></canvas>
      </section>

      <section class="controls" aria-label="Feldgrößen anpassen">
        <h2>Feldgrößen anpassen</h2>
        <div id="sizeControls" class="size-controls"></div>
      </section>

      <button id="spinButton" class="spin-button">Rad starten</button>

      <section class="result-box" aria-live="polite">
        <p>Letztes Ergebnis: <strong id="latestResult">Noch kein Dreh.</strong></p>
      </section>

      <section class="log" aria-label="Ergebnisprotokoll">
        <h2>Ergebnisprotokoll</h2>
        <ol id="resultLog"></ol>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
